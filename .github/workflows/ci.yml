name: Node.js CI
on: [push, pull_request] # 当发生 push 或 pull_request 事件时触发

jobs:
  test:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 环境作为 runner
    steps:
      - uses: actions/checkout@v4 # 将代码 checkout 到 runner 中
      - uses: actions/setup-node@v4 # 设置 Node.js 环境
        with:
          node-version: "20"
      - run: npm install # 安装依赖
      - run: npm test # 运行测试
